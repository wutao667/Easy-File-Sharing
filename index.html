<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Sharing</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 600px;
  margin: 80px auto;
  padding: 20px;
  text-align: center;
  background: #f5f5f5;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 40px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
h1 { font-size: 22px; color: #333; margin-bottom: 10px; }
p { color: #666; margin-bottom: 24px; }
.file-info { font-size: 14px; color: #999; margin-bottom: 30px; }
.download-btn {
  display: inline-block;
  padding: 14px 48px;
  background: #1677ff;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 16px;
  transition: background 0.2s;
}
.download-btn:hover { background: #4096ff; }
</style>
</head>
<body>
<div class="card">
  <h1>📦 File Sharing</h1>
  <p class="file-info">wdbiblehd_7_4.apk · 73 MB</p>
  <a class="download-btn" href="wdbiblehd_7_4.apk" download>⬇ Download</a>
</div>
</body>
</html>
